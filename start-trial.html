```html
<!DOCTYPE html>
<html lang="en-IN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Start Free Trial — ZAFtool Excel Add-in</title>

<link rel="icon" type="image/png" href="/favicon.png">

<style>
body{font-family:Arial;background:#070B14;color:#fff;margin:0}
.container{max-width:900px;margin:auto;padding:40px}
.card{background:#111827;padding:30px;border-radius:10px}
input,select{width:100%;padding:10px;margin:10px 0;background:#070B14;color:#fff;border:1px solid #333;border-radius:5px}
button{background:#2563EB;color:white;border:none;padding:12px;width:100%;border-radius:6px;font-weight:bold;cursor:pointer}
button:hover{background:#3B82F6}
.tab-buttons{display:flex;margin-bottom:20px}
.tab-btn{flex:1;padding:10px;border:none;background:#111827;color:#aaa;cursor:pointer}
.tab-btn.active{background:#2563EB;color:white}
.tab-panel{display:none}
.tab-panel.active{display:block}
</style>

</head>

<body>

<div class="container">

<div class="tab-buttons">
<button class="tab-btn active" onclick="switchTab('trial-tab',this)">🚀 14 Day Trial</button>
<button class="tab-btn" onclick="switchTab('lite-tab',this)">🆓 Free Lite</button>
</div>

<!-- TRIAL -->
<div class="tab-panel active" id="trial-tab">

<div class="card">

<h2>Start your free 14 day trial</h2>

<form id="trialForm">

<input type="text" id="trial-name" placeholder="Your name" required>

<input type="email" id="trial-email" placeholder="Work email" required>

<select id="trial-role">
<option value="">Select your role</option>
<option>Investment Banker</option>
<option>Auditor</option>
<option>FP&A</option>
<option>M&A / Due Diligence</option>
<option>Student</option>
<option>Other</option>
</select>

<button type="submit">Get Instant Download Link →</button>

</form>

</div>
</div>

<!-- LITE -->
<div class="tab-panel" id="lite-tab">

<div class="card">

<h2>ZAFtool Lite — Free Forever</h2>

<form id="liteForm">

<input type="text" id="lite-name" placeholder="Your name" required>

<input type="email" id="lite-email" placeholder="Email" required>

<select id="lite-role">
<option value="">Select your role</option>
<option>Investment Banker</option>
<option>Auditor</option>
<option>FP&A</option>
<option>M&A / Due Diligence</option>
<option>Student</option>
<option>Other</option>
</select>

<button type="submit">Get Free Download →</button>

</form>

</div>
</div>

</div>

<script>

function switchTab(tabId,btn){

document.querySelectorAll(".tab-panel").forEach(p=>p.classList.remove("active"))
document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"))

document.getElementById(tabId).classList.add("active")
btn.classList.add("active")

}

/* TRIAL FORM */

document.getElementById("trialForm").addEventListener("submit",async function(e){

e.preventDefault()

const button=e.target.querySelector("button")
button.disabled=true
button.innerText="Sending..."

const name=document.getElementById("trial-name").value
const email=document.getElementById("trial-email").value
const role=document.getElementById("trial-role").value

try{

const res=await fetch("/api/send-download",{

method:"POST",
headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name:name,
email:email,
role:role,
plan:"trial"
})

})

if(res.ok){

alert("Download link sent to your email. Please check your inbox.")

}else{

alert("Something went wrong. Please try again.")

}

}catch(err){

alert("Network error. Please try again.")

}

button.disabled=false
button.innerText="Get Instant Download Link →"

})

/* LITE FORM */

document.getElementById("liteForm").addEventListener("submit",async function(e){

e.preventDefault()

const button=e.target.querySelector("button")
button.disabled=true
button.innerText="Sending..."

const name=document.getElementById("lite-name").value
const email=document.getElementById("lite-email").value
const role=document.getElementById("lite-role").value

try{

const res=await fetch("/api/send-download",{

method:"POST",
headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name:name,
email:email,
role:role,
plan:"lite"
})

})

if(res.ok){

alert("Download link sent to your email. Please check your inbox.")

}else{

alert("Something went wrong. Please try again.")

}

}catch(err){

alert("Network error. Please try again.")

}

button.disabled=false
button.innerText="Get Free Download →"

})

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Check Your Email</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
background:#070B14;
color:white;
text-align:center;
padding:80px
}

.box{
background:#111827;
padding:40px;
border-radius:10px;
max-width:500px;
margin:auto
}

h1{color:#3B82F6}

p{color:#ccc;font-size:18px}
</style>

</head>

<body>

<div class="box">

<h1>📩 Check your email</h1>

<p>
Your download link has been sent to your email.
</p>

<p>
Open the email and click the download button.
</p>

<p style="font-size:14px;color:#888">
If you don't see it, check your spam folder.
</p>

</div>

</body>
</html>
